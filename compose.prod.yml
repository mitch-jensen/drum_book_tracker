---
services:
  caddy:
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./caddy:/etc/caddy:ro
      - static:/srv/static
    depends_on:
      backend:
        condition: service_started
  backend:
    build:
      target: production
    restart: unless-stopped
    volumes:
      - media_data:/app/src/media
      - static:/app/src/staticfiles
  db:
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/18/docker

volumes:
  db_data:
  media_data:
  static:

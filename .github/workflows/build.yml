---
name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: docker/setup-buildx-action@v2.0.0

      - name: Build
        uses: docker/bake-action@v7.0.0
        with:
          push: false

<tr id="section-{{ section.id }}">
    <td>{{ section.book }}</td>
    <td>{{ section.title }}</td>
    <td>{{ section.order }}</td>
    <td class="text-end">
        <button class="btn btn-sm btn-outline-primary"
                hx-get="{% url 'section-edit' section.id %}"
                hx-target="#section-{{ section.id }}"
                hx-swap="outerHTML">Edit</button>
    </td>
</tr>

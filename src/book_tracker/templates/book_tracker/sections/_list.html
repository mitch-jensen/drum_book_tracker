<table class="table table-striped table-hover align-middle">
    <thead>
        <tr>
            <th>Book</th>
            <th>Title</th>
            <th>Order</th>
            <th class="text-end">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for section in sections %}
            {% include "book_tracker/sections/_row.html" with section=section only %}
        {% empty %}
            <tr>
                <td colspan="4" class="text-center text-muted">No sections yet.</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
<div id="section-form-container">{% include "book_tracker/sections/_form.html" %}</div>

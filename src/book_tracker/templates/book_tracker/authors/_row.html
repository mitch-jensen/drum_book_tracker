<tr id="author-{{ author.id }}">
    <td>{{ author.first_name }}</td>
    <td>{{ author.last_name }}</td>
    <td class="text-end">
        <button class="btn btn-sm btn-outline-primary"
                hx-get="{% url 'author-edit' author.id %}"
                hx-target="#author-{{ author.id }}"
                hx-swap="outerHTML">Edit</button>
    </td>
</tr>

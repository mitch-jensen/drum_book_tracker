<tr id="book-{{ book.id }}">
    <td>
        <input type="text" name="title" value="{{ form.title.value|default:'' }}"
            class="form-control form-control-sm{% if form.title.errors %} is-invalid{% endif %}">
        {% for error in form.title.errors %}
        <div class="invalid-feedback">{{ error }}</div>
        {% endfor %}
    </td>
    <td>
        <input type="number" name="page_count" value="{{ form.page_count.value|default:'' }}"
            class="form-control form-control-sm{% if form.page_count.errors %} is-invalid{% endif %}" min="0">
        {% for error in form.page_count.errors %}
        <div class="invalid-feedback">{{ error }}</div>
        {% endfor %}
    </td>
    <td>
        <select name="authors" multiple
            class="form-select form-select-sm{% if form.authors.errors %} is-invalid{% endif %}">
            {% for value, label in form.authors.field.choices %}
            <option value="{{ value }}" {% if value|stringformat:"s" in form.authors.value %}selected{% endif %}>{{
                label }}</option>
            {% endfor %}
        </select>
        {% for error in form.authors.errors %}
        <div class="invalid-feedback">{{ error }}</div>
        {% endfor %}
    </td>
    <td class="text-end">
        <button class="btn btn-sm btn-success" hx-post="{% url 'book-update' book.id %}" hx-target="#book-{{ book.id }}"
            hx-swap="outerHTML" hx-include="closest tr">Save</button>
        <button class="btn btn-sm btn-outline-secondary" hx-get="{% url 'book-row' book.id %}"
            hx-target="#book-{{ book.id }}" hx-swap="outerHTML">Cancel</button>
    </td>
</tr>

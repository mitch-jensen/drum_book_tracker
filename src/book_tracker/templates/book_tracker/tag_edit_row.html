<tr id="tag-{{ tag.id }}">
    <td>
        <input type="text"
               name="name"
               value="{{ form.name.value|default:'' }}"
               class="form-control form-control-sm{% if form.name.errors %} is-invalid{% endif %}">
        {% for error in form.name.errors %}<div class="invalid-feedback">{{ error }}</div>{% endfor %}
    </td>
    <td class="text-end">
        <button class="btn btn-sm btn-success"
                hx-post="{% url 'tag-update' tag.id %}"
                hx-target="#tag-{{ tag.id }}"
                hx-swap="outerHTML"
                hx-include="closest tr">Save</button>
        <button class="btn btn-sm btn-outline-secondary"
                hx-get="{% url 'tag-row' tag.id %}"
                hx-target="#tag-{{ tag.id }}"
                hx-swap="outerHTML">Cancel</button>
    </td>
</tr>

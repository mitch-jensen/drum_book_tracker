<table class="table table-striped table-hover align-middle">
    <thead>
        <tr>
            <th>Name</th>
            <th class="text-end">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for tag in tags %}
            {% include "book_tracker/tags/_row.html" with tag=tag only %}
        {% empty %}
            <tr>
                <td colspan="2" class="text-center text-muted">No tags yet.</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
<div id="tag-form-container">{% include "book_tracker/tags/_form.html" %}</div>

<tr id="tag-{{ tag.id }}">
    <td>{{ tag.name }}</td>
    <td class="text-end">
        <button class="btn btn-sm btn-outline-primary"
                hx-get="{% url 'tag-edit' tag.id %}"
                hx-target="#tag-{{ tag.id }}"
                hx-swap="outerHTML">Edit</button>
    </td>
</tr>

<table class="table table-striped table-hover align-middle">
    <thead>
        <tr>
            <th>Book</th>
            <th>Section</th>
            <th>Page #</th>
            <th>Exercise</th>
            <th>Date</th>
            <th>Tempo</th>
            <th>Difficulty</th>
            <th>Relaxation</th>
            <th>Notes</th>
            <th class="text-end">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
            {% include "book_tracker/logs/_row.html" with log=log only %}
        {% empty %}
            <tr>
                <td colspan="10" class="text-center text-muted">No log entries yet.</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
<div id="log-form-container">{% include "book_tracker/logs/_form.html" %}</div>

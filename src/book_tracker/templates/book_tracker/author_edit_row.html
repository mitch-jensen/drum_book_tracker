<tr id="author-{{ author.id }}">
    <td>
        <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}"
            class="form-control form-control-sm{% if form.first_name.errors %} is-invalid{% endif %}">
        {% for error in form.first_name.errors %}
        <div class="invalid-feedback">{{ error }}</div>
        {% endfor %}
    </td>
    <td>
        <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}"
            class="form-control form-control-sm{% if form.last_name.errors %} is-invalid{% endif %}">
        {% for error in form.last_name.errors %}
        <div class="invalid-feedback">{{ error }}</div>
        {% endfor %}
    </td>
    <td class="text-end">
        <button class="btn btn-sm btn-success" hx-post="{% url 'author-update' author.id %}"
            hx-target="#author-{{ author.id }}" hx-swap="outerHTML" hx-include="closest tr">Save</button>
        <button class="btn btn-sm btn-outline-secondary" hx-get="{% url 'author-row' author.id %}"
            hx-target="#author-{{ author.id }}" hx-swap="outerHTML">Cancel</button>
    </td>
</tr>

---
services:
  backend:
    build:
      target: test
    command:
      - "-lc"
      - "sleep infinity"
    healthcheck:
      disable: true
    environment:
      BASE_URL: http://backend:8000
      SECRET_KEY: insecure-test-secret-key  # pragma: allowlist secret
      DATABASE_NAME: test_db
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_password  # pragma: allowlist secret
      DATABASE_HOST: db
      DATABASE_PORT: 5432

  db:
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password  # pragma: allowlist secret
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -d test_db -U test_user"
      interval: 10s
      timeout: 5s
      retries: 5
